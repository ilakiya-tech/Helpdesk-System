<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Report - Helpdesk Ticketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #1a5f9e;
            --secondary-color: #2c7cc4;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            color: var(--text-dark);
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .chart-container {
            width: 50%;
            margin: 2rem auto;
            padding: 20px;
            background: var(--white);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ticket-table {
            width: 100%;
            background-color: var(--white);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
        }

        .ticket-table th {
            background-color: var(--background-light);
            color: var(--text-gray);
            font-weight: 600;
            padding: 1rem;
            text-align: left;
        }

        .ticket-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-primary {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color) !important;
            border-color: var(--secondary-color) !important;
        }

        @media (max-width: 768px) {
            .chart-container {
                width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="d-flex">
    <aside class="sidebar p-3 text-white" style="background:#1a5f9e;min-height:100vh;width:240px;">
        <div class="mb-4"><strong>Carbochem</strong><br><small>Admin Portal</small></div>
        <a href="admin.html" class="d-block text-white text-decoration-none py-1">📊 Dashboard</a>
        <a href="admin-users.html" class="d-block text-white text-decoration-none py-1">👥 Users</a>
        <a href="admin-staff.html" class="d-block text-white text-decoration-none py-1">🛠️ Staff</a>
        <a href="admin-holidays.html" class="d-block text-white text-decoration-none py-1">📅 Holidays</a>
        <a href="admin-report.html" class="d-block text-white text-decoration-none py-1 opacity-75 fw-bold">📈 Reports</a>
        <button class="btn btn-outline-light btn-sm w-100 mt-4" onclick="logout()">Logout</button>
    </aside>
    <div class="flex-grow-1 p-3">
    <div class="dashboard">
        <div class="dashboard-header">
            <div class="logo-container">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="var(--primary-color)" />
                    <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                </svg>
                <span class="company-name">Carbochem</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <h1 class="m-0">Admin Report - Helpdesk Ticketing</h1>
                <a href="admin.html" class="btn btn-primary">View Tickets</a>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="ticketChart"></canvas>
        </div>
        <table class="ticket-table">
            <thead>
                <tr>
                    <th>Ticket ID</th>
                    <th>Issue Name</th>
                    <th>Raised Date</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Due Date</th>
                </tr>
            </thead>
            <tbody id="ticket-report-body">
                <!-- Tickets will load from API -->
            </tbody>
        </table>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('token') || localStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'index.html';
        }

        let ticketChart;
        let allTickets = [];

        // Load tickets and generate report
        async function loadReport() {
            try {
                const result = await API.getTickets();
                if (result.success) {
                    allTickets = result.tickets;
                    generateChart(allTickets);
                    renderReportTable(allTickets);
                }
            } catch (error) {
                console.error('Failed to load report:', error);
            }
        }

        // Generate pie chart based on ticket statuses
        function generateChart(tickets) {
            const statusCounts = {
                'Open': 0,
                'In Progress': 0,
                'Resolved': 0,
                'Closed': 0,
                'Overdue': 0
            };

            tickets.forEach(ticket => {
                const status = ticket.status;
                if (statusCounts.hasOwnProperty(status)) {
                    statusCounts[status]++;
                } else {
                    statusCounts['Open']++; // Default to Open if status unknown
                }
            });

            const ctx = document.getElementById('ticketChart').getContext('2d');
            
            if (ticketChart) {
                ticketChart.destroy(); // Destroy existing chart before creating new one
            }

            ticketChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(statusCounts),
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: ['#99d6ff', '#ffcc99', '#b3c6ff', '#d1d1d1', '#ff9999']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: 'black'
                            }
                        },
                        title: {
                            display: true,
                            text: 'Ticket Status Distribution',
                            font: {
                                size: 16
                            }
                        }
                    }
                }
            });
        }

        // Render report table
        function renderReportTable(tickets) {
            const tbody = document.getElementById('ticket-report-body');
            tbody.innerHTML = '';

            tickets.forEach(ticket => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td>${ticket.title}</td>
                    <td>${new Date(ticket.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</td>
                    <td>${ticket.status}</td>
                    <td>${ticket.priority}</td>
                    <td>${ticket.dueDate ? new Date(ticket.dueDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : 'N/A'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Load report when page loads
        loadReport();
    </script>
    </div>
    </div>
</div>
</body>
</html>
