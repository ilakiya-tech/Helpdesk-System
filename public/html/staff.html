<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Field Staff Ticket Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a5f9e;
            --secondary-color: #2c7cc4;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-color: var(--background-light);
            color: var(--text-dark);
        }
        
        .navbar {
            background-color: var(--primary-color);
        }

        .navbar .nav-link {
            color: var(--white) !important;
        }

        .navbar .nav-link:hover {
            color: var(--secondary-color) !important;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-logo {
            height: 32px;
            width: auto;
        }

        .dashboard {
            max-width: 1400px;
            margin: 20px auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .ticket-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .ticket-filters select,
        .ticket-filters input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            flex-grow: 1;
        }

        .ticket-table {
            width: 100%;
            background-color: var(--white);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .ticket-table th {
            background-color: var(--background-light);
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
            padding: 1rem;
            text-align: left;
        }

        .ticket-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .ticket-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open { 
            background-color: #e6f2ff; 
            color: #1e3a8a; 
        }
        .status-in-progress { 
            background-color: #dbeafe; 
            color: #1d4ed8; 
        }
        .status-resolved { 
            background-color: #ddf4e4; 
            color: #166534; 
        }

        .view-details-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .view-details-btn:hover {
            background-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 1rem;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .ticket-filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="var(--primary-color)" />
                    <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                </svg>
                Staff Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">View Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="dashboard">
        <div class="dashboard-header">
            <div class="logo-container">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="var(--primary-color)" />
                    <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                </svg>
                <span class="company-name">Carbochem</span>
            </div>
            <h1>Field Staff Ticket Dashboard</h1>
        </div>

        <div class="ticket-filters">
            <select id="status-filter">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in-progress">In Progress</option>
                <option value="resolved">Resolved</option>
            </select>
            <input type="text" id="search-input" placeholder="Search tickets...">
        </div>

        <table class="ticket-table" id="ticket-table">
            <thead>
                <tr>
                    <th>Ticket ID</th>
                    <th>Title</th>
                    <th>Customer</th>
                    <th>Created Date</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ticket-list">
                <!-- Tickets will be dynamically populated from API -->
            </tbody>
        </table>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        let allTickets = [];

        // Load assigned tickets for this staff member
        async function loadTickets() {
            try {
                const result = await API.getTickets();
                if (result.success) {
                    const username = localStorage.getItem('username');
                    // Staff see tickets assigned to them
                    allTickets = result.tickets.filter(ticket => 
                        ticket.assignedTo === username
                    );
                    renderTickets(allTickets);
                }
            } catch (error) {
                console.error('Failed to load tickets:', error);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function renderTickets(filteredTickets = allTickets) {
            const ticketList = document.getElementById('ticket-list');
            ticketList.innerHTML = '';
            
            if (filteredTickets.length === 0) {
                ticketList.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No tickets assigned to you</td></tr>';
                return;
            }

            filteredTickets.forEach(ticket => {
                const statusClass = ticket.status.toLowerCase().replace(' ', '-');
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td>${ticket.title}</td>
                    <td>${ticket.customerName || 'N/A'}</td>
                    <td>${formatDate(ticket.createdAt)}</td>
                    <td>
                        <span class="ticket-status status-${statusClass}">
                            ${ticket.status}
                        </span>
                    </td>
                    <td>${ticket.priority}</td>
                    <td>
                        <button class="view-details-btn" onclick="viewTicketDetails('${ticket.id}')">View Details</button>
                    </td>
                `;
                ticketList.appendChild(row);
            });
        }

        // Filter by status
        document.getElementById('status-filter').addEventListener('change', (e) => {
            const status = e.target.value;
            const filteredTickets = status 
                ? allTickets.filter(t => t.status.toLowerCase().replace(' ', '-') === status)
                : allTickets;
            renderTickets(filteredTickets);
        });

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredTickets = allTickets.filter(t => 
                t.title.toLowerCase().includes(searchTerm) ||
                t.id.toString().includes(searchTerm) ||
                (t.customerName && t.customerName.toLowerCase().includes(searchTerm))
            );
            renderTickets(filteredTickets);
        });

        function viewTicketDetails(ticketId) {
            window.location.href = `ticket-details.html?id=${ticketId}`;
        }
        
        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }

        // Initial load
        loadTickets();
    </script>
</body>
</html>
