<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Details - Carbochem Helpdesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root { --primary-color: #1a5f9e; --background-light: #f0f4f8; }
    body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
    .detail-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1rem; }
    .timeline-item { border-left: 3px solid var(--primary-color); padding-left: 1rem; margin-bottom: 1rem; }
    .comment-box { background: #f8fafc; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark" style="background: linear-gradient(45deg, #1a5f9e, #2c7cc4);">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎫 Ticket Details</span>
      <a href="#" class="btn btn-outline-light btn-sm" id="back-btn">← Back</a>
    </div>
  </nav>
  <div class="container py-4">
    <div id="loading" class="text-center py-5">Loading ticket details...</div>
    <div id="error-message" class="alert alert-danger d-none"></div>
    <div id="content" class="d-none">
      <div id="holiday-warning" class="alert alert-warning d-none">⚠️ Ticket deadline falls on a holiday!</div>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="detail-card">
            <div class="row g-3" id="ticket-fields"></div>
            <div class="mt-3" id="status-actions"></div>
          </div>
          <div class="detail-card">
            <h5>Comments & Notes</h5>
            <div id="comments-list"></div>
            <form id="comment-form" class="mt-3">
              <textarea class="form-control mb-2" id="comment-text" rows="2" placeholder="Add a note..." required></textarea>
              <button type="submit" class="btn btn-primary btn-sm">Add Comment</button>
            </form>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="detail-card">
            <h5>Audit Trail</h5>
            <div id="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const userRole = localStorage.getItem('userRole');
    const backUrls = { admin: 'admin.html', staff: 'staff.html', client: 'client.html' };
    document.getElementById('back-btn').href = backUrls[userRole] || 'index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('id');
    let currentTicket = null;

    const priorityDays = { High: 1, Critical: 1, Medium: 3, Low: 7 };

    async function loadAll() {
      if (!ticketId) { showError('No ticket ID provided'); return; }
      const [tr, hr, cr, holR] = await Promise.all([
        API.getTicketById(ticketId),
        API.getTicketHistory(ticketId),
        API.getComments(ticketId),
        API.getHolidaysPublic()
      ]);
      if (!tr.success) { showError(tr.message || 'Not found'); return; }
      currentTicket = tr.ticket;
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');
      renderTicket(currentTicket);
      renderHistory(hr.history || currentTicket.history || []);
      renderComments(cr.comments || currentTicket.comments || []);
      checkHolidayWarning(currentTicket, holR.holidays || []);
    }

    function renderTicket(t) {
      const estDays = priorityDays[t.priority] || 3;
      const fields = [
        ['Ticket ID', '#' + t.id],
        ['Title', t.title],
        ['Description', t.description],
        ['Category', t.category],
        ['Priority', t.priority + (userRole === 'client' ? ` <small class="text-muted">(Est. ${estDays} day${estDays>1?'s':''} resolution)</small>` : '')],
        ['Status', `<span class="badge bg-primary">${t.status}</span>`],
        ['Raised By', t.createdByName || t.createdBy || t.customerName],
        ['Assigned To', t.assignedTo || 'Unassigned'],
        ['Date Created', fmt(t.createdAt)],
        ['Date Assigned', t.assignedAt ? fmt(t.assignedAt) : 'Not yet assigned'],
        ['Last Updated', fmt(t.updatedAt || t.createdAt)],
        ['Due Date', t.dueDate ? fmt(t.dueDate) : 'N/A']
      ];
      document.getElementById('ticket-fields').innerHTML = fields.map(([l,v]) =>
        `<div class="col-md-6"><label class="form-label text-muted small fw-semibold">${l}</label><div>${v}</div></div>`).join('');

      const actions = document.getElementById('status-actions');
      if (userRole === 'staff' || userRole === 'admin') {
        const statuses = ['Open','In Progress','Resolved','Closed'];
        const cur = statuses.indexOf(t.status);
        const next = statuses.slice(Math.max(0, cur)).filter(s => s !== t.status);
        actions.innerHTML = next.length ? `<label class="form-label">Update Status</label>
          <div class="d-flex gap-2 flex-wrap">${next.map(s => `<button class="btn btn-outline-primary btn-sm" onclick="updateStatus('${s}')">${s}</button>`).join('')}</div>` : '';
      } else actions.innerHTML = '';
    }

    function renderHistory(history) {
      const el = document.getElementById('history-list');
      if (!history.length) { el.innerHTML = '<p class="text-muted small">No history yet</p>'; return; }
      el.innerHTML = history.map(h => `
        <div class="timeline-item">
          <strong>${h.changedByName || 'System'}</strong> – ${h.action.replace(/_/g,' ')}
          ${h.field ? `<br><small>${h.field}: ${h.oldValue || ''} → ${h.newValue || ''}</small>` : ''}
          <br><small class="text-muted">${fmt(h.createdAt)}</small>
        </div>`).join('');
    }

    function renderComments(comments) {
      const el = document.getElementById('comments-list');
      if (!comments.length) { el.innerHTML = '<p class="text-muted small">No comments yet</p>'; return; }
      el.innerHTML = comments.map(c => `
        <div class="comment-box"><strong>${c.authorName || 'User'}</strong> <small class="text-muted">${fmt(c.createdAt)}</small><br>${c.text}</div>`).join('');
    }

    function checkHolidayWarning(ticket, holidays) {
      if (!ticket.dueDate) return;
      const due = new Date(ticket.dueDate).toISOString().split('T')[0];
      if (holidays.some(h => h.date && h.date.startsWith(due))) {
        document.getElementById('holiday-warning').classList.remove('d-none');
      }
    }

    async function updateStatus(status) {
      const r = await API.updateTicketStatus(currentTicket._id || ticketId, status);
      if (r.success) { currentTicket = r.ticket; loadAll(); }
      else alert(r.message);
    }

    document.getElementById('comment-form').addEventListener('submit', async e => {
      e.preventDefault();
      const text = document.getElementById('comment-text').value;
      const r = await API.addComment(currentTicket._id || ticketId, text);
      if (r.success) { document.getElementById('comment-text').value = ''; loadAll(); }
      else alert(r.message);
    });

    function fmt(d) { return d ? new Date(d).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }) : 'N/A'; }
    function showError(msg) {
      document.getElementById('loading').classList.add('d-none');
      const el = document.getElementById('error-message');
      el.textContent = msg; el.classList.remove('d-none');
    }
    loadAll();
  </script>
</body>
</html>
