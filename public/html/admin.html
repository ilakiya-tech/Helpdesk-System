<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbochem - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a5f9e;
            --secondary-color: #2c7cc4;
            --background-light: #f0f4f8;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --white: #ffffff;
            --border-color: #d1d5db;
        }
		.logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--primary-color);
        }

        .navbar .nav-link {
            color: var(--white) !important;
        }

        .navbar .nav-link:hover {
            color: var(--secondary-color) !important;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-logo {
            height: 32px;
            width: auto;
        }

        .dashboard {
            max-width: 1400px;
            margin: 20px auto;
            padding: 2rem;
        }
		
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
		.dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .filter-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-container select,
        .filter-container input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            flex-grow: 1;
        }

        .ticket-table {
            width: 100%;
            background-color: var(--white);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ticket-table th {
            background-color: var(--background-light);
            color: var(--text-gray);
            font-weight: 600;
            padding: 1rem;
            text-align: left;
            cursor: pointer;
        }

        .ticket-table th:hover {
            background-color: #e2e8f0;
        }

        .ticket-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .ticket-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open { background-color: #e6f2ff; color: #1e3a8a; }
        .status-in-progress { background-color: #dbeafe; color: #1d4ed8; }
        .status-resolved { background-color: #ddf4e4; color: #166534; }

        .priority-critical { color: #dc2626; font-weight: bold; }
        .priority-high { color: #ea580c; }
        .priority-medium { color: #0369a1; }
        .priority-low { color: #4b5563; }

        .assign-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .assign-btn:hover {
            background-color: var(--secondary-color);
        }
        
        .staff-dropdown {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
        }
        
        .sort-icon {
            display: inline-block;
            margin-left: 5px;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background-color: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .view-details-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.8rem;
            line-height: 1;
        }

        .view-details-btn:hover {
            background-color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
			<svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="var(--primary-color)" />
                    <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                </svg>
                
                Admin Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">View Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-report.html">Report</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register User</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="dashboard">
        <div class="dashboard-header">
            <div class="logo-container">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="var(--primary-color)" />
                    <text x="50" y="50" text-anchor="middle" dy=".3em" fill="white" font-size="40" font-weight="bold">CC</text>
                </svg>
                <span class="company-name">Carbochem</span>
            </div>
        </div>
		<div class="filter-container">
            <input type="text" id="search-ticket" placeholder="Search by Ticket ID" oninput="filterTickets()">
            <select id="status-filter" onchange="filterTickets()">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in-progress">In Progress</option>
                <option value="resolved">Resolved</option>
            </select>
            <select id="priority-filter" onchange="filterTickets()">
                <option value="">All Priorities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <table class="ticket-table">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Ticket ID <span class="sort-icon"></span></th>
                    <th onclick="sortTable(1)">Customer Name <span class="sort-icon"></span></th>
                    <th onclick="sortTable(2)">Issue <span class="sort-icon"></span></th>
                    <th onclick="sortTable(3)">Status <span class="sort-icon"></span></th>
                    <th onclick="sortTable(4)">Priority <span class="sort-icon"></span></th>
                    <th onclick="sortTable(5)">Date Created <span class="sort-icon"></span></th>
                    <th>Assigned To</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="ticket-list">
                <!-- Tickets will load from API -->
            </tbody>
        </table>
    </div>

    <!-- Toast notification container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        // Current sort state
        let currentSortColumn = -1;
        let sortDirection = 1;
        let allTickets = [];
        
        // Load tickets on page load
        async function loadTickets() {
            try {
                const result = await API.getTickets();
                if (result.success) {
                    allTickets = result.tickets;
                    renderTickets(allTickets);
                }
            } catch (error) {
                console.error('Failed to load tickets:', error);
                showToast('Failed to load tickets', 'error');
            }
        }

        // Render tickets in table
        function renderTickets(tickets) {
            const tbody = document.getElementById('ticket-list');
            tbody.innerHTML = '';
            
            tickets.forEach(ticket => {
                const statusClass = ticket.status.toLowerCase().replace(' ', '-');
                const priorityClass = `priority-${ticket.priority.toLowerCase()}`;
                
                const row = document.createElement('tr');
                row.setAttribute('data-status', ticket.status.toLowerCase().replace(' ', '-'));
                row.setAttribute('data-priority', ticket.priority.toLowerCase());
                row.setAttribute('data-date', ticket.createdAt || new Date().toISOString().split('T')[0]);
                
                row.innerHTML = `
                    <td>#${ticket.id}</td>
                    <td>${ticket.customerName || 'N/A'}</td>
                    <td>${ticket.title}</td>
                    <td><span class="ticket-status status-${statusClass}">${ticket.status}</span></td>
                    <td class="${priorityClass}">${ticket.priority}</td>
                    <td>${new Date(ticket.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</td>
                    <td>
                        ${ticket.assignedTo ? ticket.assignedTo : `
                            <select class="staff-dropdown">
                                <option value="">Select Staff</option>
                                <option value="staff">Staff (Field Agent)</option>
                            </select>
                        `}
                    </td>
                    <td>
                        ${ticket.assignedTo ? 'Assigned' : `<button class="assign-btn" onclick="assignPerson(this, '${ticket.id}')">Assign</button>`}
                    </td>
                    <td><button class="view-details-btn" onclick="viewTicketDetails('${ticket.id}')">View Details</button></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }

        async function assignPerson(button, ticketId) {
            const row = button.closest('tr');
            const staffSelect = row.querySelector('.staff-dropdown');
            const staffName = staffSelect.options[staffSelect.selectedIndex].text;
            
            if (!staffSelect.value) {
                showToast("Please select a staff member", "error");
                return;
            }
            
            try {
                const result = await API.assignTicket(ticketId, staffName);
                if (result.success) {
                    showToast(`Ticket #${ticketId} assigned to ${staffName}`, "success");
                    loadTickets(); // Reload tickets
                }
            } catch (error) {
                showToast("Assignment failed", "error");
            }
        }

        function filterTickets() {
            const searchInput = document.getElementById('search-ticket').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const priorityFilter = document.getElementById('priority-filter').value;

            const filtered = allTickets.filter(ticket => {
                const matchesSearch = ticket.id.toString().includes(searchInput) || 
                                      ticket.title.toLowerCase().includes(searchInput);
                const matchesStatus = !statusFilter || ticket.status.toLowerCase().replace(' ', '-') === statusFilter;
                const matchesPriority = !priorityFilter || ticket.priority.toLowerCase() === priorityFilter;
                
                return matchesSearch && matchesStatus && matchesPriority;
            });
            
            renderTickets(filtered);
        }

        function sortTable(columnIndex) {
            if (columnIndex === currentSortColumn) {
                sortDirection *= -1;
            } else {
                currentSortColumn = columnIndex;
                sortDirection = 1;
            }
            
            document.querySelectorAll('th .sort-icon').forEach(icon => icon.textContent = '');
            document.querySelectorAll('th')[columnIndex].querySelector('.sort-icon').textContent = sortDirection === 1 ? '▲' : '▼';
            
            const tbody = document.getElementById('ticket-list');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                let valueA, valueB;
                
                if (columnIndex === 5) {
                    valueA = new Date(a.getAttribute('data-date'));
                    valueB = new Date(b.getAttribute('data-date'));
                } else {
                    valueA = a.querySelector(`td:nth-child(${columnIndex + 1})`).textContent.trim();
                    valueB = b.querySelector(`td:nth-child(${columnIndex + 1})`).textContent.trim();
                }
                
                if (valueA < valueB) return -1 * sortDirection;
                if (valueA > valueB) return 1 * sortDirection;
                return 0;
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }
        
        function viewTicketDetails(ticketId) {
            window.location.href = `ticket-details.html?id=${ticketId}`;
        }
        
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.backgroundColor = type === 'success' ? '#4caf50' : '#f44336';
            toast.textContent = message;
            
            toastContainer.appendChild(toast);
            toast.offsetHeight;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toastContainer.removeChild(toast), 300);
            }, 3000);
        }

        // Load tickets when page loads
        loadTickets();
    </script>
</body>
</html>
