<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Carbochem Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1a5f9e; --background-light: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--background-light); margin: 0; }
        .sidebar { background: var(--primary-color) !important; min-height: 100vh; width: 240px; }
        .sidebar-link { color: rgba(255,255,255,0.85); text-decoration: none; display: block; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 2px; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.2); color: #fff; }
        .main-content { flex: 1; padding: 1.5rem; overflow-x: auto; }
        .card-table { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        @media (max-width:768px) { .layout-row { flex-direction: column !important; } .sidebar { width: 100% !important; min-height: auto !important; } }
    </style>
</head>
<body>
<div class="d-flex layout-row">
    <aside class="sidebar p-3 text-white" id="sidebar-container"></aside>
    <main class="main-content">
        <h2 class="mb-4">User Management</h2>
        <div class="card mb-4"><div class="card-body">
            <h5 class="card-title">Create New User</h5>
            <form id="create-user-form" class="row g-3">
                <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" class="form-control" id="u-name" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="u-email" required></div>
                <div class="col-md-4"><label class="form-label">Username</label><input type="text" class="form-control" id="u-username" required></div>
                <div class="col-md-4"><label class="form-label">Password</label><input type="password" class="form-control" id="u-password" required minlength="6"></div>
                <div class="col-md-4"><label class="form-label">Role</label>
                    <select class="form-select" id="u-role" required><option value="staff">Staff</option><option value="client">Consumer</option></select></div>
                <div class="col-md-4"><label class="form-label">Phone</label><input type="tel" class="form-control" id="u-phone"></div>
                <div class="col-md-4"><label class="form-label">Department</label><input type="text" class="form-control" id="u-dept"></div>
                <div class="col-12"><button type="submit" class="btn btn-primary">Create User</button></div>
            </form>
        </div></div>
        <div class="card-table">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Name</th><th>Username</th><th>Role</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="users-table"></tbody>
            </table>
        </div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!requireAuth(['admin'])) throw new Error('auth');
Sidebar.inject('admin', 'admin-users.html');
document.getElementById('sidebar-container').innerHTML = `
  <div class="mb-4"><strong>Carbochem</strong><br><small>Admin Portal</small></div>
  <a href="admin.html" class="sidebar-link">📊 Dashboard</a>
  <a href="admin-users.html" class="sidebar-link active">👥 Users</a>
  <a href="admin-staff.html" class="sidebar-link">🛠️ Staff</a>
  <a href="admin.html#tickets" class="sidebar-link">🎫 Tickets</a>
  <a href="admin-holidays.html" class="sidebar-link">📅 Holidays</a>
  <a href="admin-report.html" class="sidebar-link">📈 Reports</a>
  <a href="register.html" class="sidebar-link">➕ Register (Legacy)</a>
  <button class="btn btn-outline-light btn-sm w-100 mt-4" onclick="logout()">Logout</button>`;

async function loadUsers() {
    const r = await API.getUsers();
    if (!r.success) return;
    const tbody = document.getElementById('users-table');
    tbody.innerHTML = r.users.filter(u => u.role !== 'admin').map(u => `
        <tr>
            <td>${u.name}</td><td>${u.username}</td><td><span class="badge bg-secondary">${u.role}</span></td>
            <td>${u.email}</td><td>${u.phone || '-'}</td>
            <td><span class="badge ${u.isActive !== false ? 'bg-success' : 'bg-danger'}">${u.isActive !== false ? 'Active' : 'Inactive'}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-${u.isActive !== false ? 'warning' : 'success'}" onclick="toggleStatus('${u.userId}', ${u.isActive !== false})">${u.isActive !== false ? 'Deactivate' : 'Activate'}</button>
                <button class="btn btn-sm btn-outline-primary" onclick="resetPw('${u.userId}')">Reset PW</button>
            </td>
        </tr>`).join('');
}
async function toggleStatus(id, active) {
    await API.updateUserStatus(id, !active);
    loadUsers();
}
async function resetPw(id) {
    const pw = prompt('Enter new password (min 6 chars):');
    if (pw && pw.length >= 6) { await API.resetUserPassword(id, pw); alert('Password reset!'); }
}
document.getElementById('create-user-form').addEventListener('submit', async e => {
    e.preventDefault();
    const r = await API.createUser({
        name: document.getElementById('u-name').value,
        email: document.getElementById('u-email').value,
        username: document.getElementById('u-username').value,
        password: document.getElementById('u-password').value,
        role: document.getElementById('u-role').value,
        phone: document.getElementById('u-phone').value,
        department: document.getElementById('u-dept').value
    });
    if (r.success) { alert('User created!'); e.target.reset(); loadUsers(); }
    else alert(r.message);
});
loadUsers();
</script>
</body>
</html>
